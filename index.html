async function doLogin(){
  const name=document.getElementById("ln")?.value.trim();
  if(!name)return;
  await startSession(name, SR);
}

async function quickLogin(name, role){
  if(name==="Julien"){
    const code=prompt("🔒 Code PIN Julien :");
    if(code!=="1635"){alert("❌ Code incorrect");return;}
  }
  await startSession(name, role);
}

async function startSession(name, role){
  U={name,role:role};
  localStorage.setItem('loisirs47_session', JSON.stringify({name,role}));
  document.getElementById("ls").style.display="none";
  if(U.role==="nettoyage"||U.role==="mecanicien"){document.getElementById("ev").style.display="block";}
  else{document.getElementById("app").style.display="block";}
  uHdr();
  const data=await dbL();if(data)VS=data;
  if(U.role==="vendeur"||U.role==="responsable"||U.role==="sav"){
    document.getElementById("nw").style.display="block";
    NF=await dbLN();uNB();
    sb.channel("nch").on("postgres_changes",{event:"INSERT",schema:"public",table:"notifications"},p=>{
      const n={...p.new.data,id:p.new.id,at:p.new.created_at,lu:false};
      NF.unshift(n);uNB();toast("🔔 "+n.titre,n.couleur||"#6B7AE8");
    }).subscribe();
  }
  CH=sb.channel("vch").on("postgres_changes",{event:"*",schema:"public",table:"ventes"},async()=>{
    const d=await dbL();
    if(d){
      // Auto-update statuts
      for(const v of d){
        const newSt=autoStatut(v);
        if(newSt!==v.statut&&v.statut!=="livre"){
          await dbS({...v,statut:newSt,modifPar:"Auto",modifAt:new Date().toISOString()});
          v.statut=newSt;
        }
      }
      VS=d;render();renderAI();if(calOpen)renderCal();
    }
  }).subscribe();
  render();
  renderAI();
  renderCal();
  renderPB();
  if(U?.name==="Julien")setTimeout(()=>pbCheckReminders(),2000);
}

function doLogout(){if(CH)sb.removeChannel(CH);U=null;VS=[];localStorage.removeItem('loisirs47_session');document.getElementById("app").style.display="none";document.getElementById("ev").style.display="none";document.getElementById("ls").style.display="flex";SR="responsable";bRL();}

function uHdr(){const c=uC(U.name);const i=U.name.split(" ").map(w=>w[0]?.toUpperCase()).slice(0,2).join("");const a=document.getElementById("uav");a.style.background=c;a.textContent=i;document.getElementById("unm").textContent=U.name;document.getElementById("url").textContent=U.role;const bh=document.getElementById("btn-histo");if(bh)bh.style.display=U.name==="Julien"?"inline-flex":"none";}

function uNB(){const n=NF.filter(x=>!x.lu).length;const b=document.getElementById("nb");if(n>0){b.style.display="flex";b.textContent=n>9?"9+":n;}else b.style.display="none";}
function tNotifs(){
  NO=!NO;
  document.getElementById("np").style.display=NO?"block":"none";
  if(NO){
    rN();
    // Mark all as read
    NF.forEach(n=>n.lu=true);
    uNB();
    // Update in DB
    sb.from("notifications").update({lu:true}).eq("lu",false).then(()=>{});
  }
}
function rN(){const ago=iso=>{if(!iso)return"";const d=Math.floor((Date.now()-new Date(iso).getTime())/1000);if(d<60)return"à l'instant";if(d<3600)return`il y a ${Math.floor(d/60)} min`;return`il y a ${Math.floor(d/3600)}h`;};const l=document.getElementById("nl");if(!NF.length){l.innerHTML=`<div style="padding:32px 16px;text-align:center;color:#94A3B8"><div style="font-size:32px">🔕</div><div style="font-size:13px;margin-top:8px">Aucune notification</div></div>`;return;}l.innerHTML=NF.map(n=>`<div class="ni" style="background:${n.lu?"#fff":"#F8FAFF"}"><div style="width:36px;height:36px;border-radius:10px;background:${(n.couleur||"#6B7AE8")}20;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${n.icon}</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">${es(n.titre)}</div><div style="font-size:11px;color:#64748B;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${es(n.detail||"")}</div><div style="font-size:10px;color:#CBD5E1;margin-top:4px">${ago(n.at)}</div></div></div>`).join("");}
function clrN(){NF=[];uNB();rN();}

function render(){
  if(U.role==="nettoyage"){rNet();renderAI();return;}
  if(U.role==="mecanicien"){rMec();renderAI();return;}
  const filt=VS.filter(v=>{ if(v.archive&&!showArchive)return false;if(fST!=="tous"&&v.statut!==fST)return false;if(fET!=="tous"&&v.etat!==fET)return false;if(SV){const q=SV.toLowerCase();if(![v.client,v.marque,v.modele,v.immatriculation,v.notes].join(" ").toLowerCase().includes(q))return false;}return true;});
  // Sort filt

  else if(sortBy==='ct') filt.sort((a,b)=>{const da=a.ct?.date||"";const db=b.ct?.date||"";if(!da)return 1;if(!db)return -1;return da.localeCompare(db);});

  const eC=VS.filter(v=>v.statut!=="livre").length,lv=VS.filter(v=>v.statut==="livre").length,ug=VS.filter(v=>{const d=dD(v.livraisonDate);return d!==null&&d<=7&&v.statut!=="livre";}).length,ca=VS.reduce((s,v)=>s+Number(v.prix||0),0),rp=VS.filter(v=>v.reprise?.vehicule).length;
  document.getElementById("mc").innerHTML=`
<div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">
  <div class="sc"><div style="font-size:26px;font-weight:800;color:#6B7AE8;font-family:monospace">${eC}</div><div style="font-size:12px;color:#94A3B8;margin-top:2px">En cours</div></div>
  <div class="sc"><div style="font-size:26px;font-weight:800;color:#22C55E;font-family:monospace">${lv}</div><div style="font-size:12px;color:#94A3B8;margin-top:2px">Livrés</div></div>
  <div class="sc"><div style="font-size:26px;font-weight:800;color:#EF4444;font-family:monospace">${ug}</div><div style="font-size:12px;color:#94A3B8;margin-top:2px">Urgents ≤7j</div></div>
  <div class="sc"><div style="font-size:26px;font-weight:800;color:#F59E0B;font-family:monospace">${rp}</div><div style="font-size:12px;color:#94A3B8;margin-top:2px">Reprises</div></div>
  <div class="sc"><div style="font-size:22px;font-weight:800;color:#0F172A;font-family:monospace">${ca.toLocaleString("fr-FR")} €</div><div style="font-size:12px;color:#94A3B8;margin-top:2px">CA total</div></div>
</div>
<div style="background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:14px;border:1px solid #E2E8F0;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
  <input type="text" value="${es(SV)}" oninput="setSV(this.value)" placeholder="🔍  Client, marque, immatriculation..." style="min-width:220px;width:auto;margin:0"/>
  <div style="display:flex;gap:5px">
    <button class="fbtn ${fET==="tous"?"on2":""}" onclick="setFET('tous')">Tous</button>
    <button class="fbtn ${fET==="neuf"?"on2":""}" onclick="setFET('neuf')">✨ Neuf</button>
    <button class="fbtn ${fET==="occasion"?"on2":""}" onclick="setFET('occasion')">🔄 Occasion</button>
  </div>
  <div style="display:flex;gap:5px;flex-wrap:wrap">
    <button class="fbtn ${fST==="tous"?"on":""}" onclick="setFST('tous')">Tous statuts</button>
    ${Object.entries(ST_FILTRES).map(([k,s])=>`<button class="fbtn ${fST===k?"on":""}" onclick="setFST('${k}')">${s.l}</button>`).join("")}
  </div>
  <div style="display:flex;gap:5px;align-items:center">
    <span style="font-size:11px;color:#94A3B8;font-weight:600">Trier :</span>

    <button class="fbtn ${sortBy==='ct'?'on':''}" onclick="sortBy='ct';render()">🔍 CT</button>

    <button class="fbtn ${showArchive?'on':''}" onclick="showArchive=!showArchive;render()" style="${showArchive?'background:#F59E0B;border-color:#F59E0B':''}" >📦 Archives</button>

  </div>
</div>
${VM==="cards"?rCards(filt):rTable(filt)}`;
}

function rCards(filt){if(!filt.length)return`<div style="text-align:center;padding:60px;color:#CBD5E1"><div style="font-size:40px">🚐</div><div style="margin-top:10px">Aucun dossier trouvé</div></div>`;return`<div class="cgrid">${filt.map(v=>rCard(v)).join("")}</div>`;}

function rCard(v){
  const d=dD(v.livraisonDate),urg=d!==null&&d<=7&&v.statut!=="livre",accA=(v.accessoires||[]).filter(a=>!a.recu).length,rct=v.modifAt&&(Date.now()-new Date(v.modifAt).getTime())<300000;
  // Card border turns green when ready
  const ctOk=!v.ct?.prevoir||v.ct?.resultat==="favorable";
  const mecaOk=!v.mecanique?.prevoir||!!v.mecanique?.dateRealise;
  const lavageOk=!!v.lavage?.realise;
  const finOk=v.financement==="Comptant"||!!v.financementSigne;
  const toutPret=ctOk&&mecaOk&&lavageOk&&finOk&&v.statut!=="livre";
  const sHtml="";
  const dots=[];
  if(v.ct?.prevoir)dots.push(`<div style="display:flex;align-items:center;gap:5px;font-size:12px"><span style="width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:${v.ct.resultat==="favorable"?"#22C55E":"#F59E0B"};color:#fff;flex-shrink:0">${v.ct.resultat==="favorable"?"✓":"!"}</span><span style="color:${v.ct.resultat==="favorable"?"#166534":"#92400E"}">CT ${v.ct.resultat==="favorable"?"OK":fmt(v.ct.date)||"à planifier"}</span></div>`);
  if(v.mecanique?.prevoir)dots.push(`<div style="display:flex;align-items:center;gap:5px;font-size:12px"><span style="width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:${v.mecanique.dateRealise?"#22C55E":"#F59E0B"};color:#fff;flex-shrink:0">${v.mecanique.dateRealise?"✓":"!"}</span><span style="color:${v.mecanique.dateRealise?"#166534":"#92400E"}">Méca. ${v.mecanique.dateRealise?"terminée le "+fmt(v.mecanique.dateRealise):fmt(v.mecanique.datePrevu)||"à planifier"}</span></div>`);
  if(v.preparationDate){
    const clTotal=CL_ITEMS.length;
    const clDone=CL_ITEMS.filter(it=>(v.checklist?.[it]?.etat==="ok"||v.checklist?.[it]?.etat==="nc")).length;
    const clDefauts=CL_ITEMS.filter(it=>v.checklist?.[it]?.etat==="defaut").length;
    const clComplete=clDone>0&&clDone===clTotal-clDefauts&&clDefauts===0;
    dots.push(`<div style="display:flex;align-items:center;gap:5px;font-size:12px"><span style="width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:${clComplete?"#22C55E":"#E5E7EB"};color:${clComplete?"#fff":"#9CA3AF"}">${clComplete?"✓":"·"}</span><span style="color:${clComplete?"#166534":"#94A3B8"}">Prépa. ${fmt(v.preparationDate)}</span></div>`);
  }
  if(v.lavageDate)dots.push(`<div style="display:flex;align-items:center;gap:5px;font-size:12px"><span style="width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:${v.lavage?.realise?'#22C55E':'#E5E7EB'};color:${v.lavage?.realise?'#fff':'#9CA3AF'}">${v.lavage?.realise?'✓':'·'}</span><span style="color:${v.lavage?.realise?'#166534':'#94A3B8'}">Lavage ${v.lavage?.realise?fmt(v.lavage.realise):fmt(v.lavageDate)}</span></div>`);
  if(accA>0)dots.push(`<div style="display:flex;align-items:center;gap:5px;font-size:12px"><span style="width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:#F59E0B;color:#fff;flex-shrink:0">!</span><span style="color:#92400E">${accA} accessoire${accA>1?"s":""} en attente</span></div>`);
  const defautsCheck=Object.entries(v.checklist||{}).filter(([,x])=>x.etat==="defaut");
  if(defautsCheck.length>0)dots.push(`<div style="display:flex;align-items:center;gap:5px;font-size:12px"><span style="width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:#EF4444;color:#fff;flex-shrink:0">⚠</span><span style="color:#991B1B">${defautsCheck.length} défaut${defautsCheck.length>1?"s":""} checklist</span></div>`);
  if(v.reprise?.vehicule)dots.push(`<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:#94A3B8"><span style="width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;background:#E5E7EB;color:#9CA3AF">·</span>Reprise : ${es(v.reprise.vehicule)}</div>`);
  return`<div class="card" onclick="oV('${v.id}')" style="${urg?"border:1.5px solid #EF444450;box-shadow:0 0 0 2px #EF444440,0 4px 16px rgba(0,0,0,0.07)":toutPret?"border:1.5px solid #22C55E;box-shadow:0 0 0 2px #22C55E30,0 4px 16px rgba(0,0,0,0.07)":""}">
    ${urg?`<div style="position:absolute;top:12px;right:12px;background:#EF4444;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px">${d<=0?"⚠ EN RETARD":"⚡ J-"+d}</div>`:""}
    ${rct&&!urg?`<div style="position:absolute;top:12px;right:12px;background:#22C55E;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px">✓ Modifié</div>`:""}
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px"><span style="font-weight:800;font-size:15px">${es(v.client)}</span>${ebdg(v.etat)}${v.archive?'<span style="background:#FEF3C7;color:#92400E;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;border:1px solid #FDE68A">📦 Archivé</span>':''}</div>
    <div style="font-size:13px;color:#6B7AE8;font-weight:600;margin-bottom:1px">${es(v.marque)} ${es(v.modele)} <span style="color:#CBD5E1">·</span> <span style="color:#94A3B8;font-weight:500">${es(v.type)}</span></div>
    ${v.etat==="occasion"&&v.immatriculation?`<div style="font-size:12px;color:#94A3B8;font-family:monospace;margin-bottom:4px">${es(v.immatriculation)}</div>`:""}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin-top:10px">${dots.join("")}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid #F1F5F9;flex-wrap:wrap;gap:6px">
      <div style="font-size:12px"><span style="color:#94A3B8">Livraison </span><strong style="color:${urg?"#EF4444":"#0F172A"}">${fmt(v.livraisonDate)}</strong>${v.livraisonReelle?`<span style="color:#22C55E;margin-left:6px;font-size:11px">✓ ${fmt(v.livraisonReelle)}</span>`:""}</div>
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">${v.financement&&v.financement!=="Comptant"?`<span style="font-size:11px;color:#8B5CF6;font-weight:600;background:#F5F3FF;padding:2px 7px;border-radius:10px;border:1px solid ${v.financementSigne?"#8B5CF6":"#E2E8F0"}">${es(v.financement)} ${v.financementSigne?"✍️":"⏳"}</span>`:""}<span style="font-weight:800;font-size:14px;font-family:monospace">${v.prix?Number(v.prix).toLocaleString("fr-FR")+" €":"—"}</span>${bdg(v.statut)}</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #F8FAFC">
      ${v.modifPar?`<div style="display:flex;align-items:center;gap:6px">${av(v.modifPar,18)}<span style="font-size:11px;color:#94A3B8">Modifié par <b style="color:#64748B">${es(v.modifPar)}</b>${v.modifAt?" · "+fmtT(v.modifAt):""}</span></div>`:"<div></div>"}
      <button onclick="event.stopPropagation();openChecklist('${v.id}')" style="padding:4px 10px;background:${Object.values(v.checklist||{}).some(x=>x.etat==='defaut')?'#FEE2E2':Object.keys(v.checklist||{}).length>0?'#DCFCE7':'#F8FAFC'};border:1.5px solid ${Object.values(v.checklist||{}).some(x=>x.etat==='defaut')?'#EF4444':Object.keys(v.checklist||{}).length>0?'#22C55E':'#E2E8F0'};border-radius:20px;font-size:11px;font-weight:700;color:${Object.values(v.checklist||{}).some(x=>x.etat==='defaut')?'#991B1B':Object.keys(v.checklist||{}).length>0?'#166534':'#94A3B8'};cursor:pointer">📋 Checklist</button>
    </div>
  </div>`;
}

function rTable(filt){
  return`<div class="twrap"><table><thead><tr>${["Client","État","Véhicule","Immat.","Statut","Prépa.","Lavage","Livraison","CT","Méca.","Access.","Financement","Prix","Modifié par"].map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${filt.map(v=>{
    const d=dD(v.livraisonDate),ug=d!==null&&d<=7&&v.statut!=="livre",aA=(v.accessoires||[]).filter(a=>!a.recu).length;
    return`<tr class="dr" onclick="oV('${v.id}')" style="${ug?"border-left:3px solid #EF4444":"border-left:3px solid transparent"}">
      <td style="font-weight:700;white-space:nowrap">${es(v.client)}</td><td>${ebdg(v.etat)}</td>
      <td style="color:#6B7AE8;font-weight:600;white-space:nowrap">${es(v.marque)} ${es(v.modele)}</td>
      <td style="font-family:monospace;color:#94A3B8;font-size:12px">${v.etat==="occasion"?(v.immatriculation||"—"):"—"}</td>
      <td>${bdg(v.statut)}</td><td style="font-size:12px;color:#64748B">${fmt(v.preparationDate)}</td>
      <td style="font-size:12px;color:#0EA5E9">${fmt(v.lavageDate)}</td>
      <td style="color:${ug?"#EF4444":"#374151"};font-weight:${ug?700:400};white-space:nowrap">${fmt(v.livraisonDate)}${ug?`<span style="margin-left:4px;font-size:10px;font-weight:800">${d<=0?"⚠":"J-"+d}</span>`:""}</td>
      <td style="text-align:center">${!v.ct?.prevoir?"—":v.ct.resultat==="favorable"?"✅":v.ct.date?"⏳":"❓"}</td>
      <td style="text-align:center">${!v.mecanique?.prevoir?"—":v.mecanique.dateRealise?"✅":v.mecanique.datePrevu?"⏳":"❓"}</td>
      <td style="text-align:center">${(v.accessoires||[]).length===0?"—":aA>0?`<span style="color:#F59E0B;font-weight:700">${aA} att.</span>`:`<span style="color:#22C55E">✓</span>`}</td>
      <td style="font-size:11px;color:#8B5CF6;white-space:nowrap">${es(v.financement||"")}${v.financement&&v.financement!=="Comptant"?v.financementSigne?" ✍️":" ⏳":""}</td>
      <td style="font-family:monospace;font-weight:700;white-space:nowrap">${v.prix?Number(v.prix).toLocaleString("fr-FR")+" €":"—"}</td>
      <td>${v.modifPar?`<div style="display:flex;align-items:center;gap:5px">${av(v.modifPar,20)}<span style="font-size:11px;color:#64748B">${es(v.modifPar)}</span></div>`:""}</td>
    </tr>`;
  }).join("")}</tbody></table></div>`;
}

function setFST(v){fST=v;render();}
function setFET(v){fET=v;render();}
function setSV(v){SV=v;render();}
function setVM(v){VM=v;render();}

function oV(id){const v=VS.find(x=>x.id===id);if(!v)return;PD=JSON.parse(JSON.stringify(v));sPanel(false);}
function sNew(){PD=NV();sPanel(true);}
function sPanel(isNew){document.getElementById("ov").style.display="block";document.getElementById("sp").style.display="block";rPanel(isNew);}
function cPanel(){document.getElementById("ov").style.display="none";document.getElementById("sp").style.display="none";PD=null;}

function rPanel(isNew){
  const v=PD;
  const isTech=U&&U.role==="preparateur";

function sF(f,sub,val){if(sub)PD[sub][f]=val;else PD[f]=val;if(f==="etat"||f==="prevoir"||f==="financementSigne")rPanel(!PD.id);}
function tF(f,sub){const cur=sub?PD[sub][f]:PD[f];sF(f,sub,!cur);}
function tTrav(t){const tr=PD.mecanique.travaux,i=tr.indexOf(t);if(i>=0)tr.splice(i,1);else tr.push(t);rPanel(!PD.id);}
function aTrav(){const v=document.getElementById("ntv").value.trim();if(!v)return;PD.mecanique.travaux.push(v);rPanel(!PD.id);}
function rTrav(i){PD.mecanique.travaux.splice(i,1);rPanel(!PD.id);}
function sAc(i,f,v){PD.accessoires[i][f]=v;}
function aAc(){const v=document.getElementById("nac").value.trim();if(!v)return;PD.accessoires.push({desc:v,commande:false,recu:false});rPanel(!PD.id);}
function rAc(i){PD.accessoires.splice(i,1);rPanel(!PD.id);}
function cnfDel(){const d=document.getElementById("dconf");d.style.display=d.style.display==="none"?"flex":"none";}
function autoStatut(v){
  if(v.statut==="livre")return v.statut;
  
  const ctOk = !v.ct?.prevoir || v.ct?.resultat==="favorable";
  const mecaOk = !v.mecanique?.prevoir || !!v.mecanique?.dateRealise;
  const lavageOk = !v.lavageDate || !!v.lavage?.realise;
  const financementOk = v.financement==="Comptant" || !!v.financementSigne;
  // Checklist : pas de défaut (les points non renseignés sont ignorés)
  const clItems=typeof CL_ITEMS!=="undefined"?CL_ITEMS:[];
  const clNoDefaut=clItems.every(it=>v.checklist?.[it]?.etat!=="defaut");
  const prepaOk = !v.preparationDate || clNoDefaut;

  const toutOk = ctOk && mecaOk && lavageOk && financementOk && prepaOk;
  if(toutOk) return "pret";
  // Si le dossier était "pret" mais une condition n'est plus remplie → repasser en commande
  if(v.statut==="pret") return "commande";
  return v.statut;
}

async function svV(){
  PD.id=PD.id||gI();
  const ancienStatut=PD.statut;
  PD.statut=autoStatut(PD);
  PD.modifPar=U.name;PD.modifAt=new Date().toISOString();
  await dbS(PD);
  if(PD.statut!==ancienStatut){
    toast(`🎉 ${PD.client} — Statut passé à "${ST[PD.statut]?.l||PD.statut}"!`,"#22C55E");
    await dbSN({type:"statut",icon:"🎉",couleur:"#22C55E",titre:`${PD.client} — Prêt à livrer !`,detail:`Toutes les conditions sont remplies`});
  } else {
    toast(`✅ ${PD.client} enregistré`,"#22C55E");
  }
  cPanel();
}

function printDossier(id){const v=VS.find(x=>x.id===id);if(!v)return;const cl=v.checklist||{};const clRows=["Gravage","Carburant","Kit sécurité","Contrôle étanchéité","Test des ouvrants","Graissage des ouvrants","Graissage des verrous de portillons","Contrôle des feux AV","Contrôle des feux AR","État du plancher","Centralisation","État des rétroviseurs","Fonctionnement autoradio","État des essuie-glaces","Fonctionnement des ouvertures placards","Contrôle gaz","Contrôle plaque cuisson","Contrôle chauffage","Contrôle chauffe-eau","Contrôle frigo","Contrôle stores extérieur","Contrôle panneau solaire","Contrôle batterie","Contrôle antenne","Contrôle TV","Contrôle caméra de recul","Contrôle climatisation cellule et porteur","Contrôle pompe à eau","Contrôle des mitigeurs","Contrôle lyre de gaz","Pneus"].map(it=>{const d=cl[it]||{etat:"",commentaire:""};const badge=d.etat==="ok"?'<span style="color:#166534;font-weight:700">✓ OK</span>':d.etat==="defaut"?`<span style="color:#991B1B;font-weight:700">⚠ Défaut</span>${d.commentaire?` — <em>${d.commentaire}</em>`:""}`:d.etat==="nc"?'<span style="color:#64748B">— N/C</span>':'<span style="color:#CBD5E1">Non renseigné</span>';return`<tr style="border-bottom:1px solid #E2E8F0"><td style="padding:5px 8px;font-size:12px">${it}</td><td style="padding:5px 8px;font-size:12px">${badge}</td></tr>`;}).join("");const w=window.open("","_blank");w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dossier — ${v.client||"—"}</title><style>body{font-family:'Segoe UI',sans-serif;color:#1E293B;padding:30px;max-width:800px;margin:0 auto}h1{font-size:22px;font-weight:800;margin-bottom:4px}h2{font-size:14px;font-weight:800;color:#6B7AE8;margin:20px 0 8px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #EEF2FF;padding-bottom:4px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:10px}.item{font-size:12px}.lbl{color:#94A3B8;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}table{width:100%;border-collapse:collapse}th{background:#F8FAFC;padding:6px 8px;font-size:10px;font-weight:800;color:#94A3B8;text-align:left;text-transform:uppercase}@media print{button{display:none}}</style></head><body><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>🚐 ${v.client||"—"}</h1><div style="font-size:13px;color:#6B7AE8;font-weight:600">${v.marque} ${v.modele||""} · ${v.type||""}</div>${v.immatriculation?`<div style="font-size:12px;color:#94A3B8;font-family:monospace">${v.immatriculation}</div>`:""}</div><div style="text-align:right;font-size:11px;color:#94A3B8">Imprimé le ${new Date().toLocaleDateString("fr-FR")}</div></div><h2>Informations dossier</h2><div class="grid"><div class="item"><div class="lbl">État</div>${v.etat==="neuf"?"✨ Neuf":"🔄 Occasion"}</div><div class="item"><div class="lbl">Statut</div>${v.statut}</div><div class="item"><div class="lbl">Date commande</div>${v.commandeDate||"—"}</div><div class="item"><div class="lbl">Livraison prévue</div>${v.livraisonDate||"—"}</div><div class="item"><div class="lbl">Livraison réelle</div>${v.livraisonReelle||"—"}</div><div class="item"><div class="lbl">Prix</div>${v.prix?Number(v.prix).toLocaleString("fr-FR")+" €":"—"}</div><div class="item"><div class="lbl">Financement</div>${v.financement||"—"}</div><div class="item"><div class="lbl">Organisme</div>${v.organismeFinancement||"—"}</div></div>${v.reprise?.vehicule?`<h2>Reprise véhicule</h2><div class="grid"><div class="item"><div class="lbl">Véhicule</div>${v.reprise.vehicule}</div><div class="item"><div class="lbl">Immat.</div>${v.reprise.immat||"—"}</div><div class="item"><div class="lbl">Valeur</div>${v.reprise.valeur?v.reprise.valeur+" €":"—"}</div><div class="item"><div class="lbl">État</div>${v.reprise.etat||"—"}</div></div>`:""}<h2>Préparation</h2><div class="grid"><div class="item"><div class="lbl">CT</div>${v.ct?.prevoir?`${v.ct.resultat||"En attente"} ${v.ct.date?"("+v.ct.date+")":""}` :"Non prévu"}</div><div class="item"><div class="lbl">Mécanique</div>${v.mecanique?.prevoir?(v.mecanique.travaux||[]).join(", ")||"Oui":"Non prévu"}</div><div class="item"><div class="lbl">Date prépa.</div>${v.preparationDate||"—"}</div><div class="item"><div class="lbl">Date lavage</div>${v.lavageDate||"—"}</div></div>${(v.accessoires||[]).length?`<h2>Accessoires</h2><div class="grid">${(v.accessoires||[]).map(a=>`<div class="item"><div class="lbl">${a.desc}</div>${a.recu?"✅ Reçu":a.commande?"📦 Commandé":"⏳ En attente"}</div>`).join("")}</div>`:""}<h2>Checklist préparation</h2><table><thead><tr><th>Point de contrôle</th><th>Résultat</th></tr></thead><tbody>${clRows}</tbody></table>${v.notes?`<h2>Notes</h2><p style="font-size:13px;color:#475569">${v.notes}</p>`:""}<div style="margin-top:30px;padding-top:16px;border-top:2px solid #E2E8F0;display:grid;grid-template-columns:1fr 1fr;gap:40px"><div><div style="font-size:11px;color:#94A3B8;margin-bottom:30px">Signature client</div><div style="border-bottom:1px solid #1E293B;width:200px"></div></div><div><div style="font-size:11px;color:#94A3B8;margin-bottom:30px">Signature vendeur</div><div style="border-bottom:1px solid #1E293B;width:200px"></div></div></div><button onclick="window.print()" style="margin-top:20px;padding:10px 20px;background:#6B7AE8;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700">🖨️ Imprimer</button></body></html>`);w.document.close();}

      dragging=true;moved=false;
      const pt=e.touches?e.touches[0]:e;
      startX=pt.clientX;startY=pt.clientY;
      const s=window.getComputedStyle(btn);
      startRight=parseInt(s.right);startBottom=parseInt(s.bottom);
      btn.style.cursor="grabbing";
      e.preventDefault();
    };
    const onMove=e=>{
      if(!dragging)return;
      const pt=e.touches?e.touches[0]:e;
      const dx=pt.clientX-startX,dy=pt.clientY-startY;
      if(Math.abs(dx)>5||Math.abs(dy)>5)moved=true;
      const newRight=Math.max(8,Math.min(window.innerWidth-64,startRight-dx));
      const newBottom=Math.max(8,Math.min(window.innerHeight-64,startBottom-dy));
      btn.style.right=newRight+"px";
      btn.style.bottom=newBottom+"px";
      const panel=document.getElementById("ai-panel");
      if(panel){panel.style.right=newRight+"px";panel.style.bottom=(newBottom+68)+"px";}
      e.preventDefault();
    };
    const onEnd=e=>{
      if(!dragging)return;
      dragging=false;
      btn.style.cursor="grab";
      const s=window.getComputedStyle(btn);
      const pos={right:parseInt(s.right),bottom:parseInt(s.bottom)};
      localStorage.setItem("aiPos",JSON.stringify(pos));
      if(!moved)toggleAI();
    };
    btn.addEventListener("mousedown",onStart);
    btn.addEventListener("touchstart",onStart,{passive:false});
    document.addEventListener("mousemove",onMove);
    document.addEventListener("touchmove",onMove,{passive:false});
    document.addEventListener("mouseup",onEnd);
    document.addEventListener("touchend",onEnd);
  },50);
}

      const dateStr=`${y}-${String(m+1).padStart(2,"0")}-${String(dayNum).padStart(2,"0")}`;

      const dayEvents=events.filter(e=>e.date===dateStr);

      ${cells}
    </div>`;
  } else {
    // Week view
    const dow=calDate.getDay(); const diff=calDate.getDate()-dow+(dow===0?-6:1);
    const weekStart=new Date(calDate); weekStart.setDate(diff);
    const today=new Date().toISOString().split("T")[0];
    let cols="";
    for(let i=0;i<7;i++){
      const d=new Date(weekStart); d.setDate(weekStart.getDate()+i);
      const dateStr=d.toISOString().split("T")[0];

      const dayEvents=events.filter(e=>e.date===dateStr);
      const evHtml=dayEvents.map(e=>`<div onclick="oV('${e.id}')" style="font-size:11px;font-weight:700;padding:5px 7px;border-radius:6px;margin-top:4px;cursor:pointer;background:${e.type==="livraison"?"#DCFCE7":e.type==="ct_done"?"#E0F2FE":"#FEF3C7"};color:${e.type==="livraison"?"#166534":e.type==="ct_done"?"#0369A1":"#92400E"};border-left:3px solid ${e.type==="livraison"?"#22C55E":e.type==="ct_done"?"#0EA5E9":"#F59E0B"}"><div>${e.label}</div><div style="font-size:10px;opacity:0.8">${e.sub}</div></div>`).join("");
      cols+=`<div style="flex:1;border-right:1px solid #F1F5F9;padding:6px;background:${isToday?"#EEF2FF":"#fff"}">

    }

  }

  // Navigation
  const prevMonth=()=>{calDate=new Date(calDate.getFullYear(),calDate.getMonth()-1,1);renderCal();};
  const nextMonth=()=>{calDate=new Date(calDate.getFullYear(),calDate.getMonth()+1,1);renderCal();};

  el.innerHTML=`${btnHtml}
  <div style="position:fixed;bottom:${calPos.bottom+68}px;right:${calPos.right}px;width:min(700px,calc(100vw - 48px));max-height:calc(100vh - 140px);background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,0.18);z-index:400;display:flex;flex-direction:column;overflow:hidden;border:1px solid #E2E8F0">

    </div>

function setupCalDrag(){
  setTimeout(()=>{
    const btn=document.getElementById("cal-btn");
    if(!btn)return;
    let dragging=false,startX,startY,startRight,startBottom,moved=false;
    const onStart=e=>{
      dragging=true;moved=false;
      const pt=e.touches?e.touches[0]:e;
      startX=pt.clientX;startY=pt.clientY;
      const s=window.getComputedStyle(btn);
      startRight=parseInt(s.right);startBottom=parseInt(s.bottom);
      btn.style.cursor="grabbing";e.preventDefault();
    };
    const onMove=e=>{
      if(!dragging)return;
      const pt=e.touches?e.touches[0]:e;
      const dx=pt.clientX-startX,dy=pt.clientY-startY;
      if(Math.abs(dx)>5||Math.abs(dy)>5)moved=true;
      const newRight=Math.max(8,Math.min(window.innerWidth-64,startRight-dx));
      const newBottom=Math.max(8,Math.min(window.innerHeight-64,startBottom-dy));
      btn.style.right=newRight+"px";btn.style.bottom=newBottom+"px";
      e.preventDefault();
    };
    const onEnd=e=>{
      if(!dragging)return;dragging=false;btn.style.cursor="grab";
      const s=window.getComputedStyle(btn);
      const pos={right:parseInt(s.right),bottom:parseInt(s.bottom)};
      localStorage.setItem("calPos",JSON.stringify(pos));
      if(!moved)toggleCal();
    };
    btn.addEventListener("mousedown",onStart);
    btn.addEventListener("touchstart",onStart,{passive:false});
    document.addEventListener("mousemove",onMove);
    document.addEventListener("touchmove",onMove,{passive:false});
    document.addEventListener("mouseup",onEnd);
    document.addEventListener("touchend",onEnd);
  },50);
}

async function pbLoad(){
  try{

    pbNotes=(data||[]).map(r=>({id:r.id,texte:r.data?.texte||"",at:r.created_at}));

}

async function pbCheckReminders(){
  if(!U||U.name!=="Julien")return;
  const today=new Date().toISOString().split("T")[0];
  const reminders=[];

  VS.filter(v=>v.statut!=="livre"&&!v.archive).forEach(v=>{
    const d=dD(v.livraisonDate);
    const client=v.client||"—";
    // Livraison J-1
    if(d===1)reminders.push(`⚡ LIVRAISON DEMAIN — ${client} (${v.marque} ${v.modele||""})`);
    // Livraison J-2
    if(d===2)reminders.push(`📅 Livraison dans 2 jours — ${client} (${v.marque} ${v.modele||""})`);
    // Livraison aujourd'hui
    if(d===0)reminders.push(`🚨 LIVRAISON AUJOURD'HUI — ${client} (${v.marque} ${v.modele||""})`);
    // CT dans 3 jours ou moins
    if(v.ct?.prevoir&&v.ct?.date&&!v.ct?.resultat){
      const dCT=dD(v.ct.date);
      if(dCT!==null&&dCT>=0&&dCT<=3)reminders.push(`🔍 CT dans ${dCT===0?"aujourd'hui":dCT+"j"} — ${client}`);
    }
    // Accessoires en attente + livraison proche
    const accA=(v.accessoires||[]).filter(a=>!a.recu).length;
    if(accA>0&&d!==null&&d<=5)reminders.push(`📦 ${accA} accessoire${accA>1?"s":""} en attente — ${client} (livraison J-${d})`);
    // Défaut checklist + livraison proche
    const defauts=Object.values(v.checklist||{}).filter(x=>x.etat==="defaut").length;
    if(defauts>0&&d!==null&&d<=5)reminders.push(`⚠️ ${defauts} défaut${defauts>1?"s":""} checklist non résolus — ${client}`);
  });

  const todayStr=new Date().toLocaleDateString("fr-FR");
  
  // Delete old reminders for today to avoid duplicates
  const oldReminders=pbNotes.filter(n=>n.texte.startsWith("📋 Rappels du "+todayStr));
  for(const old of oldReminders){
    await sb.from("pensebete").delete().eq("id",old.id);
    pbNotes=pbNotes.filter(n=>n.id!==old.id);
  }

  if(reminders.length===0)return;

  // Add fresh reminder note
  const texte="📋 Rappels du "+todayStr+" :\n"+reminders.join("\n");
  const{data,error}=await sb.from("pensebete").insert({data:{texte,par:"Auto"}}).select();
  if(!error&&data){
    pbNotes.unshift({id:data[0].id,texte,at:new Date().toISOString()});
    renderPB();
    toast("📋 Nouveaux rappels dans le pense-bête","#F59E0B");
  }
}

async function pbAdd(){
  const inp=document.getElementById("pb-inp");
  if(!inp)return;
  const texte=inp.value.trim();
  if(!texte)return;
  inp.value="";
  const{data,error}=await sb.from("pensebete").insert({data:{texte,par:"Julien"}}).select();
  if(!error&&data){
    pbNotes.unshift({id:data[0].id,texte,at:new Date().toISOString()});
    renderPB();
  }
}

async function pbDel(id){
  await sb.from("pensebete").delete().eq("id",id);
  pbNotes=pbNotes.filter(n=>n.id!==id);
  renderPB();
}

    const onMove=e=>{if(!dragging)return;const pt=e.touches?e.touches[0]:e;const dx=pt.clientX-startX,dy=pt.clientY-startY;if(Math.abs(dx)>5||Math.abs(dy)>5)moved=true;const nr=Math.max(8,Math.min(window.innerWidth-64,startRight-dx));const nb=Math.max(8,Math.min(window.innerHeight-64,startBottom-dy));btn.style.right=nr+"px";btn.style.bottom=nb+"px";const panel=btn.nextElementSibling;if(panel){panel.style.right=nr+"px";panel.style.bottom=(nb+68)+"px";}e.preventDefault();};
    const onEnd=()=>{if(!dragging)return;dragging=false;btn.style.cursor="grab";const s=window.getComputedStyle(btn);localStorage.setItem("pbPos",JSON.stringify({right:parseInt(s.right),bottom:parseInt(s.bottom)}));if(!moved)togglePB();};
    btn.addEventListener("mousedown",onStart);btn.addEventListener("touchstart",onStart,{passive:false});
    document.addEventListener("mousemove",onMove);document.addEventListener("touchmove",onMove,{passive:false});
    document.addEventListener("mouseup",onEnd);document.addEventListener("touchend",onEnd);
  },50);
}

    "Coupleur séparateur / relais de charge",
    "Panneau solaire (connexion, production)",
    "Convertisseur / chargeur 220V→12V","Onduleur 12V→230V (si équipé)",
    "Éclairages LED intérieurs","Tableau de contrôle / moniteur de bord",
    "Câble branchement secteur","Prise extérieure 220V",
    "Prises 12V et USB intérieures","Prises 220V intérieures"
  ]},
  {cat:"💧 Circuit Eau", items:[
    "Réservoir eau claire + test pompe à eau",
    "Étanchéité connexions (raccords, flexibles)",
    "Chauffe-eau / cumulus","Mitigeurs évier cuisine",
    "Mitigeurs salle de bain","Douche",
    "Réservoir eaux grises","Vanne eaux grises",
    "WC chimique / cassette",
  ]},
  {cat:"🔥 Gaz", items:[
    "Étanchéité installation gaz (détecteur)",
    "Flexibles gaz (état, dates péremption)",
    "Plaque cuisson / brûleurs","Chauffage (Truma/Webasto/Alde)",
    "Chauffe-eau gaz (si équipé)","Coffre à bouteilles (aération, fixation)",
    "Détendeur gaz","Détecteur gaz intérieur (CO + gaz)",
    "Vanne coupe-gaz","Lyre de gaz / contrôle gaz"
  ]},
  {cat:"🛋️ Aménagement Intérieur", items:[
    "Mobilier (fixations, charnières, portes placards)",
    "Réfrigérateur (12V / 220V / gaz)","Lit central / lit de pavillon",
    "Lit de pavillon électrique (si équipé)","Couchettes / lits superposés",
    "Table à manger","Sièges / banquettes (ceintures)",
    "Stores et moustiquaires","Porte d'entrée (fermeture, verrouillage)","Toit relevable / pavillon",
    "Hotte aspirante","Extincteur (péremption, accessibilité)",
    "Détecteur de fumée / CO","Propreté intérieure complète"
  ]},
  {cat:"❄️ Climatisation & Chauffage Cellule", items:[
    "Climatisation de toit (soufflage froid)",
    "Filtres climatisation","Chauffage air chaud",
    "Plancher chauffant / radiateurs (si équipé)",
    "Grille / bouche aération chauffage",
    "Ventilation / Heki / lanterneau"
  ]},
  {cat:"📺 Multimédia & Connectivité", items:[
    "Autoradio / GPS / écran embarqué",
    "Bluetooth / Android Auto / CarPlay",
    "Caméra de recul","TV (démarrage, fixation)",
    "Antenne TV / TNT","Parabole satellite (si présente)",
    "WiFi booster / routeur (si présent)","Alarme / GPS tracker (si équipé)"
  ]},
  {cat:"📄 Documents & Accessoires", items:[
    "Contrôle technique à jour","Manuel d'utilisation présent",
    "Notices équipements présentes","Clés complètes + télécommande",
    "Jeu de clés de rechange","Cric, clé de roue, triangle signalisation",
    "Gilets réfléchissants","Télécommandes équipements"
  ]}
];
const CL_ITEMS = CL_CATEGORIES.flatMap(c=>c.items);

let clOpen=false, clVehicleId=null, clData={};

function openChecklist(id){
  const v=VS.find(x=>x.id===id);
  if(!v)return;
  clVehicleId=id;
  clData=JSON.parse(JSON.stringify(v.checklist||{}));
  clOpen=true;
  renderChecklist();
}

function closeChecklist(){
  clOpen=false;
  clVehicleId=null;
  renderChecklist();
}

async function saveChecklist(){
  const v=VS.find(x=>x.id===clVehicleId);
  if(!v)return;
  const up={...v,checklist:clData,modifPar:U.name,modifAt:new Date().toISOString()};
  up.statut=autoStatut(up);
  if(up.statut!==v.statut){
    toast(`🔄 Statut mis à jour : ${ST[up.statut]?.l||up.statut}`,"#6B7AE8");
  }
  await dbS(up);
  const fresh=await dbL();if(fresh){VS=fresh;render();}
  toast("✅ Checklist enregistrée","#22C55E");
  closeChecklist();
}

function validerCategorie(catLabel){
  const cat=CL_CATEGORIES.find(c=>c.cat===catLabel);
  if(!cat)return;
  cat.items.forEach(it=>{
    if(!clData[it])clData[it]={etat:"",commentaire:""};
    clData[it].etat="ok";
    // Update row visually
    const rowId="cl-row-"+it.replace(/[^a-zA-Z0-9]/g,"_");
    const row=document.getElementById(rowId);
    if(row){
      row.style.background="#F0FDF4";
      const btns=row.querySelectorAll("button");
      if(btns[0]){btns[0].style.borderColor="#22C55E";btns[0].style.background="#DCFCE7";btns[0].style.color="#166534";}
      if(btns[1]){btns[1].style.borderColor="#E2E8F0";btns[1].style.background="#F8FAFC";btns[1].style.color="#64748B";}
      if(btns[2]){btns[2].style.borderColor="#E2E8F0";btns[2].style.background="#F8FAFC";btns[2].style.color="#64748B";}
      const commentDiv=row.querySelector(".cl-comment");
      if(commentDiv)commentDiv.remove();
    }
  });
  // Update progress bar
  const total=CL_ITEMS.length;
  const done=CL_ITEMS.filter(it=>(clData[it]?.etat==="ok"||clData[it]?.etat==="nc")).length;
  const defauts=CL_ITEMS.filter(it=>clData[it]?.etat==="defaut").length;
  const pct=Math.round(done/total*100);
  const bar=document.getElementById("cl-progress-bar");
  const info=document.getElementById("cl-progress-info");
  if(bar){bar.style.width=pct+"%";bar.style.background=defauts>0?"#EF4444":"#22C55E";}
  if(info){info.innerHTML=`${done}/${total} · ${defauts>0?`<span style="color:#EF4444">${defauts} défaut${defauts>1?"s":""}</span>`:`<span style="color:#22C55E">0 défaut</span>`}`;}
}

function setClItem(key,field,val){
  if(!clData[key])clData[key]={etat:"",commentaire:""};
  clData[key][field]=val;
  if(field==="etat"){
    // Update only the row without re-rendering the whole list
    const rowId="cl-row-"+key.replace(/[^a-zA-Z0-9]/g,"_");
    const row=document.getElementById(rowId);
    if(row){
      const isOk=val==="ok",isDef=val==="defaut",isNc=val==="nc";
      row.style.background=isDef?"#FFF8F8":isOk?"#F0FDF4":isNc?"#FAFAFA":"#fff";
      // Update button styles
      const btns=row.querySelectorAll("button");
      if(btns[0]){btns[0].style.borderColor=isOk?"#22C55E":"#E2E8F0";btns[0].style.background=isOk?"#DCFCE7":"#F8FAFC";btns[0].style.color=isOk?"#166534":"#64748B";}
      if(btns[1]){btns[1].style.borderColor=isDef?"#EF4444":"#E2E8F0";btns[1].style.background=isDef?"#FEE2E2":"#F8FAFC";btns[1].style.color=isDef?"#991B1B":"#64748B";}
      if(btns[2]){btns[2].style.borderColor=isNc?"#94A3B8":"#E2E8F0";btns[2].style.background=isNc?"#F1F5F9":"#F8FAFC";btns[2].style.color=isNc?"#475569":"#64748B";}
      // Show/hide comment input
      let commentDiv=row.querySelector(".cl-comment");
      if(isDef){
        if(!commentDiv){
          commentDiv=document.createElement("div");
          commentDiv.className="cl-comment";
          commentDiv.style.marginTop="5px";
          const safeKey=key.replace(/'/g,"\'");
          commentDiv.innerHTML=`<input type="text" value="${(clData[key].commentaire||"").replace(/"/g,"&quot;")}" oninput="if(!clData['${safeKey}'])clData['${safeKey}']={etat:'defaut',commentaire:''};clData['${safeKey}'].commentaire=this.value" placeholder="Décrire le défaut..." style="margin:0;font-size:12px;background:#FEF2F2;border-color:#FCA5A5;width:100%;padding:6px 10px;border-radius:6px;border:1.5px solid #FCA5A5;outline:none"/>`;
          row.appendChild(commentDiv);
        }
      } else {
        if(commentDiv) commentDiv.remove();
      }
      // Update progress bar
      const total=CL_ITEMS.length;
      const done=CL_ITEMS.filter(it=>(clData[it]?.etat==="ok"||clData[it]?.etat==="nc")).length;
      const defauts=CL_ITEMS.filter(it=>clData[it]?.etat==="defaut").length;
      const pct=Math.round(done/total*100);
      const bar=document.getElementById("cl-progress-bar");
      const info=document.getElementById("cl-progress-info");
      if(bar){bar.style.width=pct+"%";bar.style.background=defauts>0?"#EF4444":"#22C55E";}
      if(info){info.innerHTML=`${done}/${total} · ${defauts>0?`<span style="color:#EF4444">${defauts} défaut${defauts>1?"s":""}</span>`:`<span style="color:#22C55E">0 défaut</span>`}`;}
    } else {
      renderChecklist();
    }
  }
}

function renderChecklist(){
  let el=document.getElementById("cl-wrap");
  if(!el){el=document.createElement("div");el.id="cl-wrap";document.body.appendChild(el);}
  if(!clOpen){el.innerHTML="";return;}
  const v=VS.find(x=>x.id===clVehicleId);
  const total=CL_ITEMS.length;
  const done=CL_ITEMS.filter(it=>(clData[it]?.etat==="ok"||clData[it]?.etat==="nc")).length;
  const defauts=CL_ITEMS.filter(it=>clData[it]?.etat==="defaut").length;
  const pct=Math.round(done/total*100);

  const rows=CL_CATEGORIES.map(cat=>{
    const catRows=cat.items.map(it=>{
      const d=clData[it]||{etat:"",commentaire:""};
      const isOk=d.etat==="ok", isDef=d.etat==="defaut", isNc=d.etat==="nc";
      const key=it.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
      const rowId="cl-row-"+it.replace(/[^a-zA-Z0-9]/g,"_");return`<div id="${rowId}" style="padding:9px 14px;border-bottom:1px solid #F8FAFC;background:${isDef?"#FFF8F8":isOk?"#F0FDF4":isNc?"#FAFAFA":"#fff"}">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="flex:1;font-size:12px;font-weight:600;color:#1E293B;min-width:160px">${it}</span>
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button onclick="setClItem('${key}','etat','ok')" style="padding:3px 9px;border-radius:20px;border:2px solid ${isOk?"#22C55E":"#E2E8F0"};background:${isOk?"#DCFCE7":"#F8FAFC"};color:${isOk?"#166534":"#64748B"};font-size:11px;font-weight:700;cursor:pointer">✓ OK</button>
            <button onclick="setClItem('${key}','etat','defaut')" style="padding:3px 9px;border-radius:20px;border:2px solid ${isDef?"#EF4444":"#E2E8F0"};background:${isDef?"#FEE2E2":"#F8FAFC"};color:${isDef?"#991B1B":"#64748B"};font-size:11px;font-weight:700;cursor:pointer">⚠ Défaut</button>
            <button onclick="setClItem('${key}','etat','nc')" style="padding:3px 9px;border-radius:20px;border:2px solid ${isNc?"#94A3B8":"#E2E8F0"};background:${isNc?"#F1F5F9":"#F8FAFC"};color:${isNc?"#475569":"#64748B"};font-size:11px;font-weight:700;cursor:pointer">— N/C</button>
          </div>
        </div>
        ${isDef?`<div style="margin-top:5px"><input type="text" value="${(d.commentaire||"").replace(/"/g,"&quot;")}" oninput="if(!clData['${key}'])clData['${key}']={etat:'defaut',commentaire:''};clData['${key}'].commentaire=this.value" placeholder="Décrire le défaut..." style="margin:0;font-size:12px;background:#FEF2F2;border-color:#FCA5A5"/></div>`:""}
      </div>`;
    }).join("");
    const catKey=cat.cat;
    return`<div style="background:#EEF2FF;padding:6px 14px;font-size:10px;font-weight:800;color:#4338CA;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #C7D2FE;margin-top:4px;display:flex;align-items:center;justify-content:space-between">
      <span>${cat.cat}</span>
      <button onclick="validerCategorie('${catKey.replace(/'/g,"\'")}');event.stopPropagation()" style="padding:2px 8px;background:#22C55E;color:#fff;border:none;border-radius:10px;font-size:10px;font-weight:700;cursor:pointer">✓ Tout OK</button>
    </div>${catRows}`;
  }).join("");

  el.innerHTML=`
    <div style="position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:600;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto">
      <div style="background:#fff;border-radius:20px;width:min(640px,100%);box-shadow:0 25px 60px rgba(0,0,0,0.3);overflow:hidden;margin:auto">
        <div style="background:linear-gradient(135deg,#0F172A,#1E293B);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10">
          <div>
            <div style="font-weight:800;font-size:16px;color:#fff">📋 Checklist Préparation</div>
            <div style="font-size:12px;color:#64748B;margin-top:2px">${v?`${v.client||"—"} · ${v.marque} ${v.modele||""}`:""}</div>
          </div>
          <button onclick="closeChecklist()" style="background:rgba(255,255,255,0.1);border:none;color:#fff;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:18px">×</button>
        </div>
        <div style="padding:14px 20px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;gap:14px">
          <div style="flex:1;height:8px;background:#E2E8F0;border-radius:10px;overflow:hidden">
            <div id="cl-progress-bar" style="height:100%;background:${defauts>0?"#EF4444":"#22C55E"};width:${pct}%;transition:width 0.3s;border-radius:10px"></div>
          </div>
          <div id="cl-progress-info" style="font-size:12px;font-weight:700;color:#64748B;white-space:nowrap">${done}/${total} · ${defauts>0?`<span style="color:#EF4444">${defauts} défaut${defauts>1?"s":""}</span>`:`<span style="color:#22C55E">0 défaut</span>`}</div>
        </div>
        <div style="max-height:60vh;overflow-y:auto">${rows}</div>
        <div style="padding:14px 20px;border-top:1px solid #E2E8F0;display:flex;gap:8px;background:#fff">
          <button onclick="saveChecklist()" style="flex:1;padding:11px;background:#6B7AE8;color:#fff;border:none;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer">💾 Enregistrer</button>
          <button onclick="closeChecklist()" style="padding:11px 16px;background:#F1F5F9;color:#64748B;border:none;border-radius:10px;font-weight:700;cursor:pointer">Annuler</button>
        </div>
      </div>
    </div>`;
}

  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').then(()=>{
      console.log('SW registered');
    }).catch(e=>console.log('SW error',e));
  });
}
